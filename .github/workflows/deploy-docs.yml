name: Deploy Documentation

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time; do not cancel in-progress deployments
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build the docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v5

      - name: Install Doxygen and Graphviz
        run: sudo apt-get install -y doxygen graphviz

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python dependencies
        run: |
          pip install mkdocs
          pip install mkdocs-literate-nav

      - name: Build User Docs
        run: mkdocs build

      - name: Build Doxygen
        run: |
          ./bootstrap.sh
          ./configure --without-mpfr --enable-doxygen-doc
          make doxygen-doc

      - name: Assemble site
        run: |
          cp -r doxygen-doc/html/. site/dev/
          # Prevent GitHub Pages from processing output through Jekyll
          touch site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
